name: Daily Clip Update

on:
  schedule:
    # Runs every day at 8:00 AM UTC
    - cron: '0 8 * * *'
  # This lets you also run it manually from the Actions tab
  workflow_dispatch:

jobs:
  update-charts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-api-python-client

      - name: Run CLIP100 script
        env:
          TWITCH_ID: ${{ secrets.TWITCH_ID }}
          TWITCH_SECRET: ${{ secrets.TWITCH_SECRET }}
          YT_KEY: ${{ secrets.YT_KEY }}
        run: python CLIP100.py

      - name: Commit and push data.json
        run: |
          git config user.name "CLIP100 Bot"
          git config user.email "bot@clip100.site"
          git add data.json
          git diff --staged --quiet || git commit -m "Daily chart update $(date +'%Y-%m-%d')"
          git push
